<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reservations | Booking System</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              primary: "#e10e49",
              light: "#ffffff",
              dark: "#1e1e1e",
              blue: "#263f6a",
              green: "#284e36",
              orange: "#e37222",
              rose: "#c24d52",
            }
          },
          boxShadow: {
            soft: "0 8px 40px rgba(0, 0, 0, 0.45)",
          }
        }
      }
    }
  </script>

  <script type="module" src="/js/reservations.js" defer></script>
</head>

<body class="min-h-screen flex flex-col bg-brand-light text-brand-dark">

  <!-- HEADER -->
  <header class="sticky top-0 z-40 bg-brand-dark text-white shadow-soft">
    <div class="mx-auto max-w-7xl px-6">
      <div class="flex h-16 items-center justify-between">
        <a href="/" class="flex items-center gap-3 flex-1">
          <img src="/logo.svg" class="h-10 w-10">
          <div>
            <span class="block text-sm font-semibold">Booking System</span>
            <span class="block text-xs text-white/70">Secure resource booking</span>
          </div>
        </a>

        <nav class="flex gap-3">
          <a href="/resources" class="border px-4 py-2 rounded-xl w-32 text-center">Resources</a>
          <a href="/reservations" class="border px-4 py-2 rounded-xl w-32 text-center">Reservations</a>
          <button onclick="logout()" class="bg-brand-primary px-4 py-2 rounded-xl w-32">Sign out</button>
        </nav>
      </div>
    </div>
  </header>

  <!-- MAIN -->
  <main class="mx-auto max-w-7xl px-6 flex-grow">

    <!-- TITLE -->
    <section class="py-12">
      <div class="bg-white p-8 rounded-3xl shadow-soft">
        <h1 class="text-3xl font-semibold">Reservations</h1>
        <p class="text-sm text-black/70 mt-2">
          Create, update and delete reservations.
        </p>
      </div>
    </section>

    <!-- CONTENT -->
    <section class="pb-16">
      <div class="grid gap-8 lg:grid-cols-12">

        <!-- FORM -->
        <div class="lg:col-span-8">
          <div class="bg-white p-8 rounded-3xl shadow-soft">

            <h2 class="text-xl font-semibold">Reservation form</h2>

            <div id="message" class="hidden mt-6 border px-4 py-3 rounded-2xl text-sm"></div>

            <form id="reservationForm" class="mt-8 space-y-6">

              <input type="hidden" id="reservationId" />

              <div class="grid gap-6 lg:grid-cols-2">

                <div>
                  <label class="text-sm font-semibold">Resource ID</label>
                  <input id="resourceId" type="number" min="1" required
                    class="w-full mt-2 border px-4 py-3 rounded-2xl" />
                </div>

                <div>
                  <label class="text-sm font-semibold">User ID</label>
                  <input id="userId" type="number" min="1" required
                    class="w-full mt-2 border px-4 py-3 rounded-2xl" />
                </div>

              </div>

              <div class="grid gap-6 lg:grid-cols-2">

                <div>
                  <label class="text-sm font-semibold">Start time</label>
                  <input id="startTime" type="datetime-local" required
                    class="w-full mt-2 border px-4 py-3 rounded-2xl" />
                </div>

                <div>
                  <label class="text-sm font-semibold">End time</label>
                  <input id="endTime" type="datetime-local" required
                    class="w-full mt-2 border px-4 py-3 rounded-2xl" />
                </div>

              </div>

              <div>
                <label class="text-sm font-semibold">Note</label>
                <input id="note" type="text"
                  class="w-full mt-2 border px-4 py-3 rounded-2xl" />
              </div>

              <div>
                <label class="text-sm font-semibold">Status</label>
                <select id="status" class="w-full mt-2 border px-4 py-3 rounded-2xl">
                  <option value="active">active</option>
                  <option value="cancelled">cancelled</option>
                </select>
              </div>

              <div class="grid gap-4 sm:grid-cols-4">

                <button type="submit" value="create"
                  class="bg-brand-primary text-white py-3 rounded-2xl">
                  Create
                </button>

                <button type="submit" value="update"
                  class="bg-brand-blue text-white py-3 rounded-2xl">
                  Update
                </button>

                <button type="submit" value="delete"
                  class="bg-brand-rose text-white py-3 rounded-2xl">
                  Delete
                </button>

                <button type="button" id="clearReservationBtn"
                  class="bg-gray-200 py-3 rounded-2xl">
                  Clear
                </button>

              </div>

            </form>
          </div>
        </div>

        <!-- LIST -->
        <aside class="lg:col-span-4 space-y-6">

          <div class="bg-white p-6 rounded-3xl shadow-soft">
            <h3 class="font-semibold">Reservation list</h3>
            <div id="reservationList" class="mt-4 space-y-3"></div>
          </div>

        </aside>

      </div>
    </section>
  </main>

  <!-- FOOTER -->
  <footer class="bg-brand-dark text-white text-center py-6">
    © <span id="year"></span> Booking System
  </footer>

  <!-- SCRIPT -->
  <script>
    document.getElementById("year").textContent = new Date().getFullYear();

    function logout() {
      localStorage.removeItem("token");
      document.cookie = "token=; Max-Age=0; path=/";
      location.href = "/login";
    }

    const now = new Date();
    const localNow = new Date(now.getTime() - now.getTimezoneOffset() * 60000)
      .toISOString()
      .slice(0, 16);

    document.getElementById("startTime").min = localNow;
    document.getElementById("endTime").min = localNow;

    document.getElementById("clearReservationBtn").addEventListener("click", () => {
      document.getElementById("reservationForm").reset();
    });
  </script>

</body>
</html>
